<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ClipForge — 落地页方向 mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0D12; --bg-2:#0E1118;
    --surface:rgba(255,255,255,.035); --surface-2:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.14);
    --text:#EDEFF4; --dim:#98A2B3; --muted:#5A6473;
    --teal:#5EEAD4; --teal-soft:rgba(94,234,212,.16); --teal-line:rgba(94,234,212,.40);
    --ink:#04221E;
    --disp:"Space Grotesk", ui-sans-serif, system-ui;
    --cjk:"PingFang SC","Microsoft YaHei",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:var(--cjk); -webkit-font-smoothing:antialiased;
    min-height:100vh; position:relative; overflow-x:hidden;
  }
  /* 顶部冷调氛围光 + 极淡网格 —— 工作台质感，克制 */
  .ambient{position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(900px 420px at 50% -8%, rgba(94,234,212,.10), transparent 70%),
      radial-gradient(700px 500px at 85% 0%, rgba(124,92,255,.07), transparent 65%);}
  .grid{position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:64px 64px;-webkit-mask-image:radial-gradient(circle at 50% 22%,#000,transparent 72%);mask-image:radial-gradient(circle at 50% 22%,#000,transparent 72%);}
  .wrap{position:relative;max-width:1080px;margin:0 auto;padding:0 32px}

  nav{display:flex;align-items:center;justify-content:space-between;height:72px}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-weight:600;font-size:18px;letter-spacing:-.01em}
  .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--teal),#6CA8FF);display:grid;place-items:center;color:#04221E;box-shadow:0 0 22px -6px var(--teal-line)}
  .mark svg{width:16px;height:16px}
  .nav-r{display:flex;align-items:center;gap:8px}
  .pill{height:34px;padding:0 14px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--dim);font-size:13px;display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:.18s}
  .pill:hover{border-color:var(--border-2);color:var(--text)}
  .gear{width:34px;height:34px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--dim);display:grid;place-items:center;cursor:pointer;transition:.18s}
  .gear:hover{color:var(--text);border-color:var(--border-2)}

  .hero{padding:54px 0 40px;text-align:center}
  .eyebrow{font-family:var(--disp);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);opacity:.85;margin-bottom:20px}
  h1{font-family:var(--cjk);font-weight:700;font-size:clamp(38px,6vw,64px);line-height:1.04;letter-spacing:-.02em;margin-bottom:18px}
  h1 .hl{position:relative;color:var(--teal);text-shadow:0 0 34px rgba(94,234,212,.35)}
  .sub{color:var(--dim);font-size:17px;line-height:1.7;max-width:560px;margin:0 auto 38px}

  /* 签名元素：双模式吸入区（呼吸光） */
  .intake{max-width:620px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:14px;backdrop-filter:blur(14px);box-shadow:0 30px 80px -40px rgba(0,0,0,.8)}
  .tabs{display:flex;gap:6px;background:rgba(0,0,0,.25);border-radius:13px;padding:5px;margin-bottom:14px}
  .tab{flex:1;height:40px;border:0;border-radius:9px;background:transparent;color:var(--dim);font-family:var(--cjk);font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.18s}
  .tab.active{background:var(--surface-2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border-2)}
  .tab i{font-size:16px}

  .drop{position:relative;border:1.5px dashed var(--teal-line);border-radius:14px;background:radial-gradient(420px 160px at 50% 30%,var(--teal-soft),transparent 70%);padding:40px 24px 30px;display:flex;flex-direction:column;align-items:center;gap:6px;animation:breathe 4.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 1px transparent,0 0 46px -16px rgba(94,234,212,.30)}50%{box-shadow:0 0 0 1px rgba(94,234,212,.18),0 0 78px -14px rgba(94,234,212,.5)}}
  .drop .ic{width:54px;height:54px;border-radius:16px;background:var(--surface-2);border:1px solid var(--border-2);display:grid;place-items:center;color:var(--teal);margin-bottom:8px}
  .drop .ic svg{width:24px;height:24px}
  .drop .t{font-size:16px;font-weight:500}
  .drop .s{font-size:13px;color:var(--muted)}

  .cta-row{display:flex;align-items:center;gap:14px;margin-top:14px;padding:2px 4px 4px}
  .cta{height:48px;padding:0 24px;border:0;border-radius:12px;background:var(--teal);color:var(--ink);font-family:var(--cjk);font-size:15px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 12px 30px -12px var(--teal-line);transition:.18s}
  .cta:hover{transform:translateY(-1px);box-shadow:0 16px 36px -12px var(--teal-line)}
  .reassure{font-size:12.5px;color:var(--muted);line-height:1.5;text-align:left}
  .reassure b{color:var(--dim);font-weight:600}

  .examples{margin-top:26px;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
  .chip{padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--dim);cursor:pointer;transition:.18s}
  .chip:hover{border-color:var(--teal-line);color:var(--text)}

  .adv{display:flex;justify-content:center;padding:30px 0 50px}
  .adv a{font-size:12.5px;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:7px;border:1px solid transparent;padding:8px 14px;border-radius:999px;transition:.18s}
  .adv a:hover{color:var(--dim);border-color:var(--border)}

  @media (prefers-reduced-motion:reduce){.drop{animation:none}}
</style>
</head>
<body>
  <div class="ambient"></div>
  <div class="grid"></div>
  <div class="wrap">
    <nav>
      <div class="brand"><span class="mark"><svg viewBox="0 0 24 24" fill="none"><polygon points="23 7 16 12 23 17 23 7" fill="#04221E"/><rect x="1" y="5" width="15" height="14" rx="3" fill="#04221E"/></svg></span>ClipForge</div>
      <div class="nav-r">
        <button class="pill">中文 / EN</button>
        <button class="gear" aria-label="设置"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      </div>
    </nav>

    <section class="hero">
      <div class="eyebrow">AI 带货短视频工作台</div>
      <h1>丢张商品图，<span class="hl">直接出片</span></h1>
      <p class="sub">上传商品图，或说一句话主题。AI 自动写脚本、配画面、配音，合成竖屏成片——先开跑，要用到 AI 时再配 Key。</p>

      <div class="intake">
        <div class="tabs">
          <button class="tab active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.6-3.6a2 2 0 0 0-2.8 0L6 20"/></svg>上传商品图</button>
          <button class="tab"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19v3"/><path d="M8 22h8"/><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/></svg>一句话成片</button>
        </div>
        <div class="drop">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg></div>
          <div class="t">拖入商品图，或点击上传</div>
          <div class="s">JPG / PNG，最多 5 张 · 没素材？下面点个示例</div>
        </div>
        <div class="cta-row">
          <button class="cta">开始生成 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
          <div class="reassure">还没配 Key？开始时一键接 <b>Atlas Cloud</b>——脚本 + 图 + 视频 + 配音，一个 Key 全搞定。</div>
        </div>
      </div>

      <div class="examples">没素材，先试试 <span class="chip">便携榨汁杯 ¥129</span><span class="chip">冷萃咖啡液 ¥59</span><span class="chip">云柔加厚抽纸 ¥39</span></div>
    </section>

    <div class="adv">
      <a href="#">高级设置 · 多平台 / 自定义模型 / 生成参数 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a>
    </div>
  </div>
</body>
</html>
